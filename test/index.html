<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>SmartWishlistAlerts — Interactive Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>SmartWishlistAlerts — Demo</h1>

    <section>
      <h2>👟 Product</h2>
      <div class="stat">Price: $<span id="originalPrice"></span></div>
      <div class="stat">Stock: <span id="originalStock"></span></div>
    </section>

    <section>
      <h2>Simulation</h2>
      <label for="priceInput">Price</label>
      <input type="number" id="priceInput" />

      <label for="stockInput">Stock</label>
      <input type="number" id="stockInput" />

      <button id="applyBtn">Apply Changes</button>
    </section>

    <section>
      <h2>Alerts</h2>
      <div id="alerts">(none yet)</div>
    </section>

    <section>
      <h2>⏰ Reminder Test</h2>
      <div class="stat">
        Time since added/last viewed: <span id="reminderTimer">0</span>s
      </div>
      <div class="stat" style="font-size: 12px; color: #888">
        Demo uses a ~10 second window (instead of 7 real days) so we don't have
        to wait a week.
      </div>
      <button id="checkReminderBtn">Check Now</button>
      <button id="markViewedBtn">Mark as Viewed</button>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/smart-wishlist-alerts@0.1.1/dist/wishlist-alerts.global.js"></script>

    <script src="app.js"></script>
  </body>
</html>
